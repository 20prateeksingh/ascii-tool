<!DOCTYPE html>
<html lang="en">

<head>

    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-9XVG4PMPTE');

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Asset Generator</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="container">
        <!-- Controls Sidebar -->
        <div class="controls">
            <h1>ASCII Generator</h1>

            <div class="file-upload">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <label style="margin: 0; display: block;">Source Image</label>
                    <div id="imageActions" style="display: none; gap: 0.5rem;">
                        <button class="secondary" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; width: auto;"
                            onclick="document.getElementById('imgUpload').click()">Replace</button>
                        <button class="secondary" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; width: auto;"
                            onclick="removeImage()">Remove</button>
                    </div>
                </div>
                <label for="imgUpload" class="file-btn" id="uploadLabel">Choose Image...</label>
                <div id="thumbnailContainer"
                    style="display: none; border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; background: var(--surface); text-align: center;">
                    <img id="imageThumbnail"
                        style="max-width: 100%; max-height: 150px; object-fit: contain; border-radius: 4px;" />
                </div>
                <input type="file" id="imgUpload" accept="image/*">
            </div>

            <div class="group">
                <label>ASCII Ramp <select id="rampSelect">
                        <option value=" .*₹$€£">Fintech</option>
                        <option value=" .:-=+*#%@" selected>Max</option>
                        <option value=" 01">Binary</option>
                        <option value=" ░▒▓█">Blocks</option>
                        <option value=" ▫◽◻">Squares</option>
                        <option value=" ◦○◎◍●">Circles</option>
                        <option value=" ▵▴◭▲">Triangles</option>
                        <option value=" ▖▚▜█">Blocks (Dots)</option>
                        <option value="custom">Custom</option>
                    </select></label>
                <input type="text" id="rampInput" value=" .:-=+*#%@">
            </div>

            <div class="group">
                <label>Color</label>
                <input type="color" id="colorPicker" value="#000000">
            </div>

            <div class="sub-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="sub-group-title">Adjustments</span>
                    <button class="secondary" style="padding: 0.15rem 0.6rem; font-size: 0.75rem; width: auto;"
                        onclick="resetAdjustments()">Reset</button>
                </div>

                <div class="group">
                    <label>Resolution <span id="widthVal" class="val-display">100</span></label>
                    <input type="range" id="widthRange" min="20" max="300" value="100">
                </div>

                <div class="group">
                    <label>Brightness <span id="brightVal" class="val-display">100%</span></label>
                    <input type="range" id="brightRange" min="0" max="200" value="100">
                </div>

                <div class="group">
                    <label>Contrast <span id="contrastVal" class="val-display">100%</span></label>
                    <input type="range" id="contrastRange" min="0" max="200" value="100">
                </div>

                <div class="group">
                    <label>Saturation <span id="satVal" class="val-display">100%</span></label>
                    <input type="range" id="satRange" min="0" max="200" value="100">
                </div>
            </div>

            <div class="actions">
                <button class="primary" onclick="copyToClipboard()">Copy Text</button>
                <button class="secondary" onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>

        <!-- Preview Area -->
        <div class="output-area" id="outputContainer">
            <div class="output-toolbar" id="outputToolbar" style="display: none;">
                <!-- Zoom Controls -->
                <div class="toolbar-group">
                    <button class="icon-btn" onclick="handleZoom(0.1)" title="Zoom In">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                            <path d="M12 10h-2v2H9v-2H7V9h2V7h1v2h2v1z" />
                        </svg>
                    </button>
                    <button class="icon-btn" onclick="handleZoom(-0.1)" title="Zoom Out">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                            <path d="M7 9h5v1H7z" />
                        </svg>
                    </button>
                    <button class="icon-btn" onclick="resetZoom()" title="1:1 Size">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M15 3l2.3 2.3-2.89 2.87 1.42 1.42L18.7 6.7 21 9V3zM3 9l2.3-2.3 2.87 2.89 1.42-1.42L6.7 5.3 9 3H3zm6 12l-2.3-2.3 2.89-2.87-1.42-1.42L5.3 17.3 3 15v6zM21 15l-2.3 2.3-2.87-2.89-1.42 1.42 2.89 2.87L15 21h6z" />
                        </svg>
                    </button>
                </div>

                <!-- Visual Toggles -->
                <div class="toolbar-group">
                    <button class="icon-btn" id="bgToggleBtn" onclick="toggleBg()"
                        title="Toggle Background (Light/Dark)">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z" />
                        </svg>
                    </button>
                    <button class="icon-btn" id="weightToggleBtn" onclick="toggleWeight()"
                        title="Toggle Font Weight (Normal/Bold)">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="output-container-inner" id="outputContainerInner">
                <div id="ascii-wrapper">
                    <pre id="ascii-output">Upload an image to start...</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imgUpload = document.getElementById('imgUpload');
        const rampInput = document.getElementById('rampInput');
        const rampSelect = document.getElementById('rampSelect');

        // Ranges
        const widthRange = document.getElementById('widthRange');
        const brightRange = document.getElementById('brightRange');
        const contrastRange = document.getElementById('contrastRange');
        const satRange = document.getElementById('satRange');

        // Values
        const widthVal = document.getElementById('widthVal');
        const brightVal = document.getElementById('brightVal');
        const contrastVal = document.getElementById('contrastVal');
        const satVal = document.getElementById('satVal');

        const colorPicker = document.getElementById('colorPicker');
        const output = document.getElementById('ascii-output');

        let currentImage = null;

        // Settings
        const FONT_ASPECT = 0.6; // Width/Height of monospace char (approx)

        // Output Container & Features
        const outputToolbar = document.getElementById('outputToolbar');
        const asciiWrapper = document.getElementById('ascii-wrapper');
        const outputContainerInner = document.getElementById('outputContainerInner');

        let currentZoom = 1;
        let isDarkBg = false;
        let isBold = false;

        imgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    imageThumbnail.src = event.target.result;
                    uploadLabel.style.display = 'none';
                    thumbnailContainer.style.display = 'block';
                    imageActions.style.display = 'flex';
                    outputToolbar.style.display = 'flex';
                    resetZoom();
                    generateASCII();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function removeImage() {
            currentImage = null;
            imgUpload.value = '';
            imageThumbnail.src = '';
            uploadLabel.style.display = 'block';
            thumbnailContainer.style.display = 'none';
            imageActions.style.display = 'none';
            outputToolbar.style.display = 'none';
            output.textContent = "Upload an image to start...";
        }

        const inputs = [rampInput, widthRange, brightRange, contrastRange, satRange, colorPicker];
        inputs.forEach(el => {
            el.addEventListener('input', generateASCII);
        });

        rampSelect.addEventListener('change', (e) => {
            if (e.target.value !== 'custom') {
                rampInput.value = e.target.value;
                generateASCII();
            }
        });

        rampInput.addEventListener('input', () => {
            let match = false;
            for (let i = 0; i < rampSelect.options.length; i++) {
                if (rampSelect.options[i].value === rampInput.value) {
                    rampSelect.selectedIndex = i;
                    match = true;
                    break;
                }
            }
            if (!match) {
                rampSelect.value = 'custom';
            }
        });

        function resetAdjustments() {
            widthRange.value = 100;
            brightRange.value = 100;
            contrastRange.value = 100;
            satRange.value = 100;
            generateASCII();
        }

        function generateASCII() {
            if (!currentImage) return;

            const ramp = rampInput.value || " .:-=+*#%@";
            const width = parseInt(widthRange.value);
            const color = colorPicker.value;

            const brightness = parseInt(brightRange.value);
            const contrast = parseInt(contrastRange.value);
            const saturation = parseInt(satRange.value);

            // Update UI
            widthVal.textContent = width;
            brightVal.textContent = brightness + "%";
            contrastVal.textContent = contrast + "%";
            satVal.textContent = saturation + "%";

            output.style.color = color;

            // Compute dynamic font size to keep overall visual width bounded by the container
            const containerWidth = outputContainerInner.clientWidth - 40; // 20px padding each side approx
            const containerHeight = outputContainerInner.clientHeight - 40;

            // Maintain aspect ratio
            const aspectRatio = currentImage.height / currentImage.width;
            const height = Math.floor(width * aspectRatio * FONT_ASPECT);

            // Calculate what font size would fit width-wise and height-wise perfectly
            const fitWidthSize = containerWidth / (width * FONT_ASPECT);
            const fitHeightSize = containerHeight / height;

            // Use whichever size hits the boundary first
            const targetFontSize = Math.max(1, Math.min(fitWidthSize, fitHeightSize));

            output.style.fontSize = `${targetFontSize}px`;
            output.style.lineHeight = `${targetFontSize}px`;
            output.style.fontWeight = isBold ? "bold" : "normal";

            // Create offscreen canvas
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // Apply filters BEFORE drawing
            ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;

            // Draw and resize
            ctx.drawImage(currentImage, 0, 0, width, height);
            const data = ctx.getImageData(0, 0, width, height).data;

            let ascii = "";

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const offset = (y * width + x) * 4;
                    const r = data[offset];
                    const g = data[offset + 1];
                    const b = data[offset + 2];
                    const a = data[offset + 3];

                    // Alpha check
                    if (a < 50) {
                        ascii += " ";
                        continue;
                    }

                    // Calculate brightness (0-1)
                    let bVal = (0.299 * r + 0.587 * g + 0.114 * b) / 255;

                    // Invert: Dark pixels should be dense characters
                    bVal = 1.0 - bVal;

                    const idx = Math.floor(bVal * (ramp.length - 1));
                    const charIdx = Math.max(0, Math.min(ramp.length - 1, idx));
                    ascii += ramp[charIdx];
                }
                ascii += "\n";
            }

            output.textContent = ascii;
        }

        function copyToClipboard() {
            const text = output.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('button.primary');
                const originalText = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => btn.textContent = originalText, 1500);
            });
        }

        function downloadPNG() {
            if (!output.textContent || output.textContent.startsWith("Upload")) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const lines = output.textContent.split('\n');
            if (lines[lines.length - 1] === "") lines.pop();

            const fontSize = 24;
            const font = `500 ${fontSize}px 'Source Code Pro', monospace`;
            ctx.font = font;

            // Measure
            const lineHeight = fontSize;
            const charWidth = ctx.measureText('M').width;

            const margin = 40;
            canvas.width = (lines[0].length * charWidth) + (margin * 2);
            canvas.height = (lines.length * lineHeight) + (margin * 2);

            // Draw
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = colorPicker.value;
            ctx.font = font;
            ctx.textBaseline = 'top';

            lines.forEach((line, i) => {
                ctx.fillText(line, margin, margin + (i * lineHeight));
            });

            // Download
            const link = document.createElement('a');
            link.download = 'ascii-asset.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // --- View Controls ---
        function handleZoom(delta) {
            currentZoom = Math.max(0.1, Math.min(5, currentZoom + delta));
            asciiWrapper.style.transform = `scale(${currentZoom})`;
        }

        function resetZoom() {
            currentZoom = 1;
            asciiWrapper.style.transform = `scale(1)`;
        }

        // --- Visual Adjustments ---
        function toggleBg() {
            isDarkBg = !isDarkBg;
            const btn = document.getElementById('bgToggleBtn');
            btn.classList.toggle('active');

            if (isDarkBg) {
                document.getElementById('outputContainer').style.background = "#111111";
                document.getElementById('outputContainer').style.color = "#FFFFFF";
                // If the color is set to exactly #000000, invert to white just for preview visibility
                if (colorPicker.value === "#000000") {
                    output.style.color = "#FAFAFA";
                }
            } else {
                document.getElementById('outputContainer').style.background = "var(--surface)";
                document.getElementById('outputContainer').style.color = "var(--text)";
                generateASCII(); // reset color
            }
        }

        function toggleWeight() {
            isBold = !isBold;
            const btn = document.getElementById('weightToggleBtn');
            btn.classList.toggle('active');
            generateASCII();
        }

    </script>
</body>

</html>
